<!DOCTYPE html>
<html>
<head>
    <title>Test for Score Reset</title>
</head>
<body>
    <h1>Test for Score Reset</h1>
    <div id="test-output"></div>
    <iframe id="game-frame" src="../development/index.html" width="1280" height="720"></iframe>

    <script>
        const testOutput = document.getElementById('test-output');
        const gameFrame = document.getElementById('game-frame');

        gameFrame.onload = () => {
            const gameWindow = gameFrame.contentWindow;
            const game = gameWindow.game;

            // Wait for the game to be ready
            game.events.on('ready', () => {
                const playScene = game.scene.getScene('PlayScene');

                // 1. Let the score increase
                setTimeout(() => {
                    playScene.player.x = 1000; // Simulate player moving
                    playScene.update(); // Manually call update to update score

                    const scoreBeforeHit = playScene.score;
                    testOutput.innerHTML += `<p>Score before hitting obstacle: ${scoreBeforeHit}</p>`;

                    // 2. Simulate hitting an obstacle
                    playScene.hitObstacle();

                    // 3. Check the score after restart
                    setTimeout(() => {
                        const scoreAfterHit = playScene.score;
                        testOutput.innerHTML += `<p>Score after hitting obstacle: ${scoreAfterHit}</p>`;

                        if (scoreAfterHit === 0) {
                            testOutput.innerHTML += '<p style="color: green;">Test Passed!</p>';
                        } else {
                            testOutput.innerHTML += '<p style="color: red;">Test Failed!</p>';
                        }
                    }, 1000);
                }, 2000);
            });
        };
    </script>
</body>
</html>
