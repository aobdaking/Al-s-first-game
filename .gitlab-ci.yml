# .gitlab-ci.yml (Configured for GitLab Pages & Vite)

image: node:20-alpine

# Cache dependencies to speed up pipelines
cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

stages:
  - build
  - test
  - deploy

# --- BUILD STAGE ---
build_game:
  stage: build
  script:
    - echo "🛠️ Building Vite + Phaser game..."
    - npm install
    - npm run build
  artifacts:
    name: "vite-build-$CI_COMMIT_REF_SLUG"
    paths:
      - dist/ # Vite outputs the compiled game here
    expire_in: 1 hour

# --- TEST STAGE (Robbie's Domain) ---
run_tests:
  stage: test
  dependencies:
    - build_game
  script:
    - echo "🧪 Robbie is running the automated test suites..."
    - npm run test:unit
    - npm run test:e2e

# --- DEPLOYMENT STAGE (GitLab Pages) ---
# For GitLab pages, the job MUST be named 'pages' and the artifact 
# folder MUST be named 'public'.
pages:
  stage: deploy
  dependencies:
    - build_game
  script:
    - echo "🚀 Deploying to GitLab Pages..."
    - rm -rf public # Ensure clean slate
    - mv dist public # Rename Vite's 'dist' folder to 'public' for GitLab Pages
  artifacts:
    paths:
      - public/
  only:
    - main # Only deploy when code is pushed to the main branch
